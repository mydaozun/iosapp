    <script>
        function filterLinks() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const cards = document.querySelectorAll('.link-card');
            const categories = document.querySelectorAll('.category');

            cards.forEach(card => {
                const name = card.querySelector('.link-name').textContent.toLowerCase();
                const desc = card.querySelector('.link-desc').textContent.toLowerCase();
                const match = name.includes(filter) || desc.includes(filter);
                card.style.display = match ? '' : 'none';
            });

            // 隐藏没有可见链接的分类
            categories.forEach(category => {
                const visibleCards = category.querySelectorAll('.link-card[style=""]').length;
                const allCardsHidden = category.querySelectorAll('.link-card[style="display: none"]').length ===
                                       category.querySelectorAll('.link-card').length;
                category.style.display = allCardsHidden ? 'none' : '';
            });
        }
